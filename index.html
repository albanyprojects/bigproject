<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Navigation</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
        
        /* Background image */
        background-image: url('background.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        .container {
            display: flex;
            gap: 20px;
        }

        .nav-button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s ease;
        }

        .nav-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="nav-button" onclick="location.href='sales1.html'">
            Sales 1
        </button>

        <button class="nav-button" onclick="location.href='sales2.html'">
            Sales 2
        </button>

        <button class="nav-button" onclick="location.href='sales3.html'">
            Sales 3
        </button>
    </div>

</body>
</html>
