<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Navigation</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;

            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            font-family: Arial, sans-serif;
        }

        .top-header {
            width: 100%;
            background-color: #0d47a1;
            color: white;
            padding: 25px 40px;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .sub-header {
            width: 100%;
            background-color: #FFA700;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-button {
            width: 220px;
            padding: 18px 25px;
            font-size: 18px;
            border: none;
            border-radius: 14px;
            cursor: pointer;

            background: linear-gradient(135deg, #1565c0, #0d47a1);
            color: white;

            font-weight: bold;
            letter-spacing: 0.5px;

            box-shadow: 0 6px 15px rgba(0,0,0,0.25);

            transition: all 0.25s ease;
        }

        .nav-button:hover {
            background: linear-gradient(135deg, #1976d2, #0b3c91);
            transform: translateX(8px) scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.35);
        }

        .nav-button:active {
            transform: scale(0.98);
        }

        .logo-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .logo-container img {
            max-width: 400px;
            width: 100%;
            height: auto;

            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
        }
    </style>
</head>

<body>

    <div class="top-header">
        Pallet-Profitability-Calculator-Index
    </div>

    <div class="sub-header">
        Select Your Calculator Formula Below
    </div>

    <div class="main-content">

        <div class="container">

            <button class="nav-button" onclick="location.href='sales1.html'">
                Sales 1
            </button>

            <button class="nav-button" onclick="location.href='sales2.html'">
                Sales 2
            </button>

            <button class="nav-button" onclick="location.href='sales3.html'">
                Sales 3
            </button>

        </div>

        <div class="logo-container">
            <img src="logo.png" alt="Company Logo">
        </div>

    </div>

</body>
</html>
